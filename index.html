<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEME TERMINAL 2026</title>
    <style>
        :root {
            --bg: #05070a;
            --card: #111827;
            --accent: #0ea5e9;
            --text: #f1f5f9;
            --stop: #dc2626;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            border-bottom: 2px solid var(--accent);
            margin-bottom: 12px;
        }

        textarea {
            width: 100%;
            height: 60px;
            background: #1f2937;
            border: 1px solid #374151;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .btn-main {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            width: 100%;
            max-width: 500px;
        }

        .btn-s {
            background: #1f2937;
            border: 1px solid #374151;
            color: #e5e7eb;
            padding: 10px 4px;
            border-radius: 8px;
            font-size: 11px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-height: 65px;
            justify-content: center;
        }

        .btn-s:active { background: #374151; transform: scale(0.95); }
        .btn-s span { font-size: 18px; }
        .btn-s b { 
            display: block; 
            width: 100%; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
        }

        .stop {
            grid-column: span 3;
            background: var(--stop);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 10px;
            border: none;
        }
    </style>
</head>
<body>

<div class="header">
    <textarea id="inp" placeholder="Напиши что-то для озвучки..."></textarea>
    <button class="btn-main" onclick="speak()">ОЗВУЧИТЬ РОБОТОМ</button>
</div>

<div class="grid">
    <div class="btn-s" onclick="ps('пердешь.mp3')"><span>💨</span><b>Пердеж</b></div>
    <div class="btn-s" onclick="ps('есть пробитие.mp3')"><span>🎯</span><b>Пробитие</b></div>
    <div class="btn-s" onclick="ps('фонк.mp3')"><span>🎧</span><b>Фонк</b></div>
    <div class="btn-s" onclick="ps('ооуй.mp3')"><span>😯</span><b>Ооуй</b></div>
    <div class="btn-s" onclick="ps('телефон звонит.mp3')"><span>📞</span><b>Звонок</b></div>
    <div class="btn-s" onclick="ps('повезло повезло.mp3')"><span>🍀</span><b>Повезло</b></div>

    <div class="btn-s" onclick="ps('гимн россий.mp3')"><span>🇷🇺</span><b>Гимн РФ</b></div>
    <div class="btn-s" onclick="ps('ссср.mp3')"><span>🚩</span><b>СССР</b></div>
    <div class="btn-s" onclick="ps('гимн качкев.mp3')"><span>💪</span><b>Качки</b></div>
    <div class="btn-s" onclick="ps('от винта.mp3')"><span>⚙️</span><b>От винта</b></div>
    <div class="btn-s" onclick="ps('vnimanie-vash-telefon-peregrelsia.mp3')"><span>🔥</span><b>Перегрев</b></div>
    <div class="btn-s" onclick="ps('kazakhstan-threatens-us-with-bombing.mp3')"><span>🇰🇿</span><b>КЗ Бомбит</b></div>

    <div class="btn-s" onclick="ps('butyrka-zapaxlo-vesnoj.mp3')"><span>🌸</span><b>Бутырка</b></div>
    <div class="btn-s" onclick="ps('KoSHHeJJ_-_YA_zdes_za_jetu_ulicu_stoyu_Slovo_pacana_80025512.mp3')"><span>🏙️</span><b>За улицу</b></div>
    <div class="btn-s" onclick="ps('mama-vyzyvai-taksi.mp3')"><span>🚕</span><b>Такси</b></div>
    <div class="btn-s" onclick="ps('khto-dvinitsia-tot-gey.mp3')"><span>🕺</span><b>Кто гей</b></div>
    <div class="btn-s" onclick="ps('chto-pochemu-ia-che-rnyi.mp3')"><span>👨🏿</span><b>Почему ч/б</b></div>
    <div class="btn-s" onclick="ps('3_-_Zvuki_stonaZvuki_devushki_zvuki_krikovMEM_bassboost_reverb_76290123.mp3')"><span>🔞</span><b>Стоны</b></div>
    
    <div class="btn-s" onclick="ps('маты ааа.mp3')"><span>🤬</span><b>Маты</b></div>
    <div class="btn-s" onclick="ps('очень очень громко.mp3')"><span>🔊</span><b>EAR RAPE</b></div>
    <div class="btn-s" onclick="ps('zxkai-ela-des-ela-sobi-nubaleprison.mp3')"><span>⛓️</span><b>Prison</b></div>

    <button class="stop" onclick="stopAll()">🛑 ВЫКЛЮЧИТЬ ВСЁ</button>
</div>

<script>
    const synth = window.speechSynthesis;
    let plays = [];

    function ps(f) {
        const a = new Audio(f);
        plays.push(a);
        a.play();
        a.onended = () => plays = plays.filter(x => x !== a);
    }

    function stopAll() {
        plays.forEach(a => { a.pause(); a.currentTime = 0; });
        plays = [];
        synth.cancel();
    }

    function speak() {
        const t = document.getElementById('inp').value;
        if (!t.trim()) return;
        const u = new SpeechSynthesisUtterance(t);
        const v = synth.getVoices();
        u.voice = v.find(x => x.lang.includes('ru')) || v[0];
        synth.speak(u);
    }
</script>

</body>
</html>
